<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ऑफलाइन — NCERT Master</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #ffffff;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: #1a1a2e; }
    p { color: #64748b; margin-bottom: 1.5rem; font-size: 0.95rem; }
    button {
      background: #1e3a5f;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      font-size: 1rem;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
    .tip {
      margin-top: 2rem;
      background: #f1f5f9;
      border-radius: 0.75rem;
      padding: 1rem;
      font-size: 0.85rem;
      color: #475569;
      max-width: 320px;
      border: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="icon">📚</div>
  <h1>आप ऑफलाइन हैं</h1>
  <p>इंटरनेट कनेक्शन नहीं मिला। पहले देखे गए अध्याय उपलब्ध हैं।</p>
  <button onclick="window.location.reload()">दोबारा कोशिश करें</button>
  <div class="tip">
    💡 <strong>सुझाव:</strong> जो अध्याय आपने पहले पढ़े हैं, वे ऑफलाइन भी काम करेंगे!
  </div>
</body>
</html>
