<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — NCERT Master</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #94a3b8; margin-bottom: 1.5rem; font-size: 0.95rem; }
    button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
    }
    .tip {
      margin-top: 2rem;
      background: #1e293b;
      border-radius: 0.75rem;
      padding: 1rem;
      font-size: 0.85rem;
      color: #cbd5e1;
      max-width: 320px;
    }
  </style>
</head>
<body>
  <div class="icon">📚</div>
  <h1>Aap Offline Hain</h1>
  <p>Internet connection nahi mili. Pehle dekhe gaye chapters available hain.</p>
  <button onclick="window.location.reload()">Dobara Try Karein</button>
  <div class="tip">
    💡 <strong>Tip:</strong> Jo chapters aapne pehle padhe hain, woh offline bhi kaam karenge!
  </div>
</body>
</html>
